<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BPS 가양 업무 매뉴얼</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1c3d6e">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header id="header">
  <button id="sidebar-toggle" class="icon-btn" aria-label="메뉴">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <rect y="3"  width="20" height="2" rx="1" fill="currentColor"/>
      <rect y="9"  width="20" height="2" rx="1" fill="currentColor"/>
      <rect y="15" width="20" height="2" rx="1" fill="currentColor"/>
    </svg>
  </button>
  <div class="logo">
    <span class="logo-badge">BMW</span>
    <span class="logo-text">BPS 가양 업무 매뉴얼</span>
  </div>
  <div class="header-right">
    <div class="search-wrap">
      <svg class="search-icon" width="15" height="15" viewBox="0 0 16 16" fill="none">
        <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
        <line x1="10.5" y1="10.5" x2="15" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text" id="search" placeholder="검색..." autocomplete="off" spellcheck="false">
    </div>
    <button id="lock-btn" class="lock-btn" title="수정 모드 전환" aria-label="수정 모드 전환">🔒</button>
  </div>
</header>

<div id="edit-bar" class="hidden">✏️ 수정 모드 활성화 — 잠금 아이콘을 클릭하면 종료됩니다</div>

<div class="layout">
  <aside id="sidebar">
    <nav id="tree"></nav>
  </aside>
  <div id="overlay" class="hidden"></div>
  <main id="main">

    <div id="view-welcome" class="view">
      <div class="welcome">
        <div class="welcome-icon">📋</div>
        <h1>BPS 가양 업무 매뉴얼</h1>
        <p>좌측에서 항목을 선택하거나 검색창을 이용하세요</p>
      </div>
    </div>

    <div id="view-content" class="view hidden">
      <div class="content-header">
        <div id="breadcrumb" class="breadcrumb"></div>
        <h2 id="page-title"></h2>
      </div>
      <div id="blocks"></div>
      <div id="add-block-bar" class="add-block-bar hidden">
        <span class="add-label">블록 추가</span>
        <button onclick="addBlock('text')">📝 텍스트</button>
        <button onclick="addBlock('list')">📋 목록</button>
        <button onclick="addBlock('warning')">⚠️ 주의사항</button>
        <button onclick="addBlock('tip')">💡 팁</button>
        <button onclick="addBlock('cost')">💰 비용</button>
      </div>
      <button id="save-btn" class="save-btn hidden" onclick="savePage()">저장</button>
    </div>

  </main>
</div>

<div id="modal" class="modal-backdrop hidden">
  <div class="modal-box">
    <h2>🔒 수정 모드 진입</h2>
    <p>비밀번호를 입력하면 콘텐츠를 수정할 수 있습니다.</p>
    <input type="password" id="pw-input" placeholder="비밀번호">
    <p id="pw-error" class="pw-error hidden">비밀번호가 올바르지 않습니다.</p>
    <div class="modal-actions">
      <button id="pw-cancel" class="btn-secondary">취소</button>
      <button id="pw-confirm" class="btn-primary">확인</button>
    </div>
  </div>
</div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script src="app.js"></script>
</body>
</html>
